name: Telegram Bot

on:
  schedule:
    - cron: '*/30 * * * *'   # каждые 30 минут
  workflow_dispatch:           # ручной запуск через GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # нужно для git push состояния

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Расписание постов
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python telegram_schedule.py

      - name: YouTube монитор
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python youtube_to_telegram.py

      - name: Сохранить состояние
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add posted_ids.txt last_video_id.txt 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "bot: update state [skip ci]" && git push)
